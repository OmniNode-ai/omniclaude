# ONEX Node Contract
# Node: NodeSkillFrictionAutofixOrchestrator
# Skill: friction_autofix
#
# Orchestrator shell node: dispatches skill invocations to the polymorphic
# agent (Polly) via the shared handle_skill_requested handler.
# All heavy logic lives in the shared handler — this node is a thin shell.

# Contract identifiers
name: node_skill_friction_autofix_orchestrator
contract_name: node_skill_friction_autofix_orchestrator
node_name: node_skill_friction_autofix_orchestrator

contract_version:
  major: 1
  minor: 0
  patch: 0

node_version:
  major: 1
  minor: 0
  patch: 0

# Node type
node_type: ORCHESTRATOR_GENERIC

# Description
description: >
  Orchestrator node for the friction_autofix skill.
  Automatically fix structurally-resolvable friction points from autopilot runs.
  Dispatches skill invocations to the polymorphic agent via the shared
  handle_skill_requested handler. Subscribes to command events, emits
  outcome events on success or failure.

# Strongly typed I/O models (shared across all skill nodes)
input_model:
  name: ModelSkillRequest
  module: omniclaude.shared.models

output_model:
  name: ModelSkillResult
  module: omniclaude.shared.models

# Execution backend configuration
execution:
  backend: claude_code
  model_purpose: null

# Event bus configuration
event_bus:
  subscribe:
    topic: "onex.cmd.omniclaude.friction_autofix.v1"
    consumer_group: "omniclaude.skill.friction_autofix"
  publish:
    success_topic: "onex.evt.omniclaude.friction_autofix-completed.v1"
    failure_topic: "onex.evt.omniclaude.friction_autofix-failed.v1"

# Capabilities
capabilities:
  - name: skill.friction_autofix
    description: Dispatch friction_autofix skill to polymorphic agent
    version: 1.0.0

# IO operations
io_operations:
  - operation: skill_requested
    description: Dispatch friction_autofix skill invocation to polymorphic agent
    handler_method: handle_skill_requested
    input_fields:
      - skill_name: str
      - skill_path: str
      - args: dict[str, str]
      - correlation_id: UUID
    output_fields:
      - skill_name: str
      - status: SkillResultStatus
      - output: str | None
      - error: str | None
      - correlation_id: UUID
    idempotent: false

# Dependencies
dependencies:
  - name: handler_skill_requested
    type: handler
    function: handle_skill_requested
    module: omniclaude.shared
    pluggable: false

# Error handling
error_handling:
  retry_policy:
    max_retries: 2
    initial_delay_ms: 500
    max_delay_ms: 5000
    exponential_base: 2
    retry_on:
      - SkillDispatchError
      - SkillTimeoutError
  circuit_breaker:
    enabled: false

# Metadata
metadata:
  author: OmniNode Team
  license: MIT
  maturity: stub
  tags:
    - orchestrator
    - skill
    - friction_autofix
